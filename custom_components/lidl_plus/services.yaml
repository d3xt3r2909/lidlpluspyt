activate_all_coupons:
  name: Activate All Coupons
  description: Activates all available Lidl Plus coupons for the configured account.
  fields: {}

set_refresh_token:
  name: Set Refresh Token
  description: >
    Update the stored refresh token. Call this from a script after running
    lidl-ha-sync.sh to push a newly obtained token without touching the HA UI.
  fields:
    refresh_token:
      name: Refresh Token
      description: The new Lidl Plus refresh token.
      required: true
      selector:
        text:
